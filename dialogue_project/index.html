<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dialogue Project — Afrin Archive</title>
    <meta name="description" content="The Afrini Dialect Project collects and documents Afrini proverbs, making them accessible in written form to both native speakers and the world in general.">
    <meta name="theme-color" content="#f7f5f3">
    <link rel="icon" type="image/png" href="../landing/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@0;1&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f5f3;
            --text-color: #3a3a3a;
            --border-color: rgba(139, 115, 85, 0.24);
            --card-bg-color: rgba(255, 255, 255, 0.82);
            --subtext-color: #8b7355;
            --green-color: #009A3D;
            --brown-color: #8b7355;
            --yellow-color: #FFCC00;
            --red-color: #F32837;
            --shadow: 0 18px 42px rgba(58, 58, 58, 0.14);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: url('../landing/images/background2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
        }

        .page-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 36px 20px 56px;
        }

        .hero {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(247, 245, 243, 0.88) 0%, rgba(242, 237, 231, 0.88) 100%);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
            padding: 32px 30px 28px;
            display: flex;
            justify-content: space-between;
            gap: 18px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* Thin ribbon in the three colors used across the archive */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg,
                    var(--green-color) 0 33.4%,
                    var(--yellow-color) 33.4% 66.7%,
                    var(--red-color) 66.7% 100%);
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--green-color);
            font-size: 0.78rem;
            font-weight: 800;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            line-height: 0.95;
        }

        .hero p {
            margin: 12px 0 0;
            max-width: 700px;
            color: var(--subtext-color);
            font-size: 1.02rem;
            line-height: 1.5;
        }

        .hero p .hint {
            font-style: italic;
            font-family: 'EB Garamond', serif;
        }

        .hero-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .back-link,
        .insta-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 12px 16px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            text-decoration: none;
            font-weight: 700;
            white-space: nowrap;
            transition: filter 0.15s ease, transform 0.15s ease;
        }

        .back-link {
            background: var(--green-color);
            color: #f7f5f3;
        }

        .insta-link {
            background: var(--yellow-color);
            color: #3a3a3a;
        }

        .back-link:hover,
        .insta-link:hover {
            filter: brightness(1.07);
            transform: translateY(-1px);
        }

        .gallery {
            margin-top: 26px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 20px;
        }

        .tile {
            position: relative;
            margin: 0;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            overflow: hidden;
            background: var(--card-bg-color);
            box-shadow: 0 10px 26px rgba(58, 58, 58, 0.12);
            cursor: zoom-in;
            transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
            opacity: 0;
            transform: translateY(14px);
            animation: tileIn 0.55s ease forwards;
            animation-delay: var(--d, 0s);
        }

        @keyframes tileIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tile:hover,
        .tile:focus-visible {
            transform: translateY(-4px);
            border-color: var(--yellow-color);
            box-shadow: 0 16px 34px rgba(58, 58, 58, 0.2), 0 0 0 3px rgba(255, 204, 0, 0.45);
            outline: none;
        }

        .tile img {
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            height: auto;
            object-fit: cover;
        }

        /* ------- Lightbox ------- */
        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(24, 20, 16, 0.9);
            backdrop-filter: blur(7px);
        }

        .lightbox.open {
            display: flex;
        }

        .lightbox img {
            max-width: min(92vw, 900px);
            max-height: 84vh;
            border-radius: 14px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.55);
            background: #fff;
        }

        .lb-btn {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 1px solid rgba(247, 245, 243, 0.25);
            background: rgba(247, 245, 243, 0.12);
            color: #f7f5f3;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s ease;
        }

        .lb-btn:hover {
            background: rgba(247, 245, 243, 0.26);
        }

        .lb-close {
            top: 18px;
            right: 18px;
        }

        .lb-prev {
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
        }

        .lb-next {
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
        }

        .lb-counter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(247, 245, 243, 0.8);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.06em;
        }

        @media (max-width: 640px) {
            .hero {
                padding: 26px 20px 24px;
            }

            .hero-actions {
                flex-direction: row;
                width: 100%;
            }

            .back-link,
            .insta-link {
                flex: 1;
            }

            .lb-prev,
            .lb-next {
                top: auto;
                bottom: 64px;
                transform: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .tile {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="page-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Afrin Archive · Afrini Dialect Project</p>
                <h1>Dialogue Project</h1>
                <p>The Afrini Dialect Project collects and documents Afrini proverbs, making them accessible in
                    written form to both native speakers and the world in general.
                    <span class="hint">Click any proverb card to see it full size.</span>
                </p>
            </div>
            <div class="hero-actions">
                <a class="back-link" href="../">&#8592; Back to the Archive</a>
                <a class="insta-link" href="https://www.instagram.com/afrini_zimane/" target="_blank"
                    rel="noopener noreferrer">Instagram &#8599;</a>
            </div>
        </header>

        <main class="gallery" id="gallery">
            <figure class="tile" style="--d:0.00s" tabindex="0"><img src="pics/image_1_Dengê_we_b.png" alt="Afrini proverb card — Dengê we…" loading="eager"></figure>
            <figure class="tile" style="--d:0.04s" tabindex="0"><img src="pics/image_1_Erd_û_esma.png" alt="Afrini proverb card — Erd û esma…" loading="eager"></figure>
            <figure class="tile" style="--d:0.08s" tabindex="0"><img src="pics/image_1_Te_sewdoli.png" alt="Afrini proverb card — Te sewdoli…" loading="eager"></figure>
            <figure class="tile" style="--d:0.12s" tabindex="0"><img src="pics/image_2_Dewatê_xo_.png" alt="Afrini proverb card — Dewatê xo…" loading="eager"></figure>
            <figure class="tile" style="--d:0.16s" tabindex="0"><img src="pics/image_2_Seri_ro_ki.png" alt="Afrini proverb card — Seri ro ki…" loading="eager"></figure>
            <figure class="tile" style="--d:0.20s" tabindex="0"><img src="pics/image_2_Sewdê_li_s.png" alt="Afrini proverb card — Sewdê li s…" loading="eager"></figure>
            <figure class="tile" style="--d:0.24s" tabindex="0"><img src="pics/image_3_Serê_min_b.png" alt="Afrini proverb card — Serê min b…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.28s" tabindex="0"><img src="pics/image_3_Çav_di_ser.png" alt="Afrini proverb card — Çav di ser…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.32s" tabindex="0"><img src="pics/image_3_Ê_min_di_d.png" alt="Afrini proverb card — Ê min di d…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.36s" tabindex="0"><img src="pics/image_4_Bî_raqpaqî.png" alt="Afrini proverb card — Bî raqpaqî…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.40s" tabindex="0"><img src="pics/image_4_Xor_rûne_û.png" alt="Afrini proverb card — Xor rûne û…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.44s" tabindex="0"><img src="pics/image_4_Şevî_reş_û.png" alt="Afrini proverb card — Şevî reş û…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.48s" tabindex="0"><img src="pics/image_5_Bî_firfirî.png" alt="Afrini proverb card — Bî firfirî…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.52s" tabindex="0"><img src="pics/image_5_Hîn_sibeh_.png" alt="Afrini proverb card — Hîn sibeh…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.56s" tabindex="0"><img src="pics/image_5_Ji_xelkê_d.png" alt="Afrini proverb card — Ji xelkê d…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.60s" tabindex="0"><img src="pics/image_6_Kol-û_kol-.png" alt="Afrini proverb card — Kol-û kol-…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.64s" tabindex="0"><img src="pics/image_6_Kutak_ji_c.png" alt="Afrini proverb card — Kutak ji c…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.68s" tabindex="0"><img src="pics/image_6_Qopoqî_ser.png" alt="Afrini proverb card — Qopoqî ser…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.72s" tabindex="0"><img src="pics/image_7_Bi_heft_de.png" alt="Afrini proverb card — Bi heft de…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.76s" tabindex="0"><img src="pics/image_7_Mijê_min_ç.png" alt="Afrini proverb card — Mijê min ç…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.80s" tabindex="0"><img src="pics/image_8_Heto_çavî_.png" alt="Afrini proverb card — Heto çavî…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.84s" tabindex="0"><img src="pics/image_8_Li_ser_hef.png" alt="Afrini proverb card — Li ser hef…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.88s" tabindex="0"><img src="pics/image_9_Bûko_piş_p.png" alt="Afrini proverb card — Bûko piş p…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.92s" tabindex="0"><img src="pics/image_9_Kevir_tûl_.png" alt="Afrini proverb card — Kevir tûl…" loading="lazy"></figure>
            <figure class="tile" style="--d:0.96s" tabindex="0"><img src="pics/image_10_Dilê_min_p.png" alt="Afrini proverb card — Dilê min p…" loading="lazy"></figure>
            <figure class="tile" style="--d:1.00s" tabindex="0"><img src="pics/image_10_Li_ser_raf.png" alt="Afrini proverb card — Li ser raf…" loading="lazy"></figure>
        </main>
    </div>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Proverb card viewer">
        <button class="lb-btn lb-close" id="lb-close" aria-label="Close">&times;</button>
        <button class="lb-btn lb-prev" id="lb-prev" aria-label="Previous">&#8249;</button>
        <img id="lb-image" src="" alt="">
        <button class="lb-btn lb-next" id="lb-next" aria-label="Next">&#8250;</button>
        <div class="lb-counter" id="lb-counter"></div>
    </div>

    <script>
        const tiles = Array.from(document.querySelectorAll('.tile'));
        const images = tiles.map(t => t.querySelector('img'));
        const lightbox = document.getElementById('lightbox');
        const lbImage = document.getElementById('lb-image');
        const lbCounter = document.getElementById('lb-counter');
        let current = -1;

        function show(i) {
            current = (i + images.length) % images.length;
            lbImage.src = images[current].src;
            lbImage.alt = images[current].alt;
            lbCounter.textContent = (current + 1) + ' / ' + images.length;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
            // warm up the neighbours so arrows feel instant
            [current + 1, current - 1].forEach(n => {
                const img = images[(n + images.length) % images.length];
                new Image().src = img.src;
            });
        }

        function close() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
            current = -1;
        }

        tiles.forEach((tile, i) => {
            tile.addEventListener('click', () => show(i));
            tile.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    show(i);
                }
            });
        });

        document.getElementById('lb-close').addEventListener('click', close);
        document.getElementById('lb-prev').addEventListener('click', e => { e.stopPropagation(); show(current - 1); });
        document.getElementById('lb-next').addEventListener('click', e => { e.stopPropagation(); show(current + 1); });
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) close();
        });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape') close();
            if (e.key === 'ArrowLeft') show(current - 1);
            if (e.key === 'ArrowRight') show(current + 1);
        });
    </script>
    <script data-goatcounter="https://afrinarchive.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>

</html>
